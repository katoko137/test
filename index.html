<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>簡易検査装置1号機 ver1.0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="title-bar">簡易検査装置1号機 ver1.0</header>

      <nav class="tabs" aria-label="画面タブ">
        <button class="tab is-active" data-target="inspection">検査</button>
        <button class="tab" data-target="operator">品種・検査員選択</button>
        <button class="tab" data-target="varieties">品種一覧</button>
        <button class="tab" data-target="history">履歴</button>
        <button class="tab" data-target="maintenance">保守</button>
        <button class="tab" data-target="exit">終了</button>
      </nav>

      <main class="main-content">
        <section id="inspection" class="panel is-active" aria-label="検査画面">
          <div class="inspection-layout">
            <div class="camera-area frame">
              <h2 class="area-title">撮影画像描画エリア</h2>
              <div class="placeholder">Image Preview</div>
            </div>
            <div class="sign-area frame">
              <h2 class="area-title">ハンドサインエリア</h2>
              <div class="placeholder">Hand Sign</div>
              <button class="start-button" type="button">開始</button>
            </div>
          </div>
        </section>

        <section id="operator" class="panel" aria-label="品種・検査員選択画面">
          <h2 class="section-title">品種・検査員選択</h2>
          <div class="frame section-body">品種選択・検査員入力エリア</div>
        </section>

        <section id="varieties" class="panel" aria-label="品種一覧画面">
          <h2 class="section-title">品種一覧</h2>
          <div class="frame section-body">品種テーブル表示エリア</div>
        </section>

        <section id="history" class="panel" aria-label="履歴画面">
          <h2 class="section-title">履歴</h2>
          <div class="frame section-body">検査履歴一覧エリア</div>
        </section>

        <section id="maintenance" class="panel" aria-label="保守画面">
          <h2 class="section-title">保守</h2>
          <div class="frame section-body">設定・メンテナンスエリア</div>
        </section>

        <section id="exit" class="panel" aria-label="終了画面">
          <h2 class="section-title">終了</h2>
          <div class="frame section-body">終了確認エリア</div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
